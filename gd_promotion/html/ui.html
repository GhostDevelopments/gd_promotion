<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#228be6',
            dark: {
              100: '#1A1B1E',
              200: '#141517',
              300: '#101113',
            }
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          animation: {
            'slide-down': 'slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'pulse-soft': 'pulseSoft 3s infinite',
          },
          keyframes: {
            slideDown: {
              '0%': { transform: 'translateY(-100%)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(0)', opacity: '1' },
              '100%': { transform: 'translateY(-100%)', opacity: '0' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Announcement</title>
</head>
<body class="bg-transparent w-screen h-screen overflow-hidden pointer-events-none flex justify-end p-6">
  
  <div id="announcement-container" class="w-[320px] hidden transition-opacity duration-500 opacity-0">
    <!-- Main Card -->
    <div class="relative overflow-hidden rounded-xl border border-white/10 animate-slide-down bg-black/40">
      
      <!-- Top Glow Border -->
      <div class="absolute top-0 left-0 right-0 h-[1.5px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-80"></div>

      <div class="p-4">
        <!-- Header -->
        <div class="flex gap-3">
          <!-- Icon Container -->
          <div class="flex-shrink-0 w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20">
            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.167H3.382a.705.705 0 01-.685-.833 11.013 11.013 0 011.683-3.604 1.75 1.75 0 011.551-.832h.584l2.147-6.167a1.76 1.76 0 013.417.592z" />
            </svg>
          </div>

          <div class="flex-1 pt-0.5">
            <h4 id="header-text" class="text-[8px] font-black text-primary tracking-[0.2em] uppercase opacity-80 mb-0.5">
              Business Announcement
            </h4>
            <h2 id="business-label" class="text-base font-extrabold text-white leading-tight">
              PDM Dealership
            </h2>
          </div>
        </div>

        <!-- Message Body -->
        <div class="mt-2.5 pl-[52px]">
          <p id="message-text" class="text-xs text-white/70 font-semibold leading-relaxed italic">
            "We are now open! Come check out our new stock!"
          </p>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-4 py-2 bg-white/[0.03] border-t border-white/5 flex justify-between items-center">
        <span class="text-[7px] text-white/20 font-black tracking-[0.2em] uppercase">Broadcast System</span>
        <div class="flex gap-1 opacity-30">
            <div class="w-1 h-1 rounded-full bg-primary"></div>
            <div class="w-1 h-1 rounded-full bg-primary"></div>
            <div class="w-1 h-1 rounded-full bg-primary animate-pulse"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
