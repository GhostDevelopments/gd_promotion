<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#3b82f6",
          },
          fontFamily: {
            sans: ["Inter", "Manrope", "sans-serif"],
          },
          animation: {
            'slide-down': 'slideDown 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards',
          },
          keyframes: {
            slideDown: {
              '0%': { transform: 'translateY(-20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(0)', opacity: '1' },
              '100%': { transform: 'translateY(-20px)', opacity: '0' },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Announcement</title>
</head>
<body class="bg-transparent w-screen h-screen overflow-hidden pointer-events-none flex items-center justify-end p-12">
  
  <div id="announcement-container" class="hidden">
    <!-- Image-styled Notification Card -->
    <div class="relative flex gap-4 p-5 rounded bg-[#2a2a2a]/95 border border-white/10 shadow-2xl animate-slide-down min-w-[380px] max-w-[450px]">
      
      <!-- Ad Badge Container -->
      <div class="flex-shrink-0 pt-1.5">
        <div class="bg-[#facc15] text-black text-[11px] font-[900] px-1.5 py-0.5 rounded-sm tracking-tighter uppercase">
          Ad
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex flex-col space-y-0.5">
        <h2 class="text-[16px] font-bold text-white/90 leading-tight">
          Business Promotion - <span id="business-label">Tokyo</span>
        </h2>
        
        <div id="sender-name" class="text-[14px] text-white/40 font-medium">
          Jimmy Cooper
        </div>
        
        <div class="text-[14px] text-white/40 font-medium pb-1.5">
          Job: <span id="job-label">Tokyo</span>
        </div>

        <div class="flex items-start gap-2 pt-1 border-t border-white/5">
          <div class="text-white/30 text-[14px] pt-0.5">•</div>
          <p id="message-text" class="text-[14px] text-white/60 font-medium leading-relaxed italic">
            Mechanic Shop is now open! Pull up & get your car tuned. Postal 101.
          </p>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
